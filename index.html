<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Autosmart Field">
<meta name="theme-color" content="#1E3A5F">
<title>Autosmart Field</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1E3A5F;--navy-lt:#2C5282;
  --green:#1A8C5E;--green-lt:#EAF7F1;--green-dk:#126644;
  --amber:#9A6B0A;--amber-lt:#FEF3C7;
  --red:#B91C1C;--red-lt:#FEE2E2;
  --blue:#1D4ED8;--blue-lt:#EFF6FF;
  --purple:#5B21B6;--purple-lt:#EDE9FE;
  --ink:#111827;--ink2:#374151;--ink3:#6B7280;--ink4:#9CA3AF;
  --bg:#F3F4F6;--card:#FFFFFF;--card2:#F9FAFB;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --rad:12px;--rad-sm:8px;
  --f:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  --m:ui-monospace,'SF Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:var(--f);color:var(--ink)}
body{display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}

/* CELEBRATE */
.celebrate{position:fixed;inset:0;z-index:1000;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s}
.celebrate.show{opacity:1;pointer-events:all}
.cel-inner{background:rgba(17,24,39,0.93);border-radius:20px;padding:1.75rem 2.25rem;text-align:center;transform:scale(.6);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.celebrate.show .cel-inner{transform:scale(1)}
.cel-emoji{font-size:58px;display:block;margin-bottom:.45rem;animation:cel-bounce .65s ease infinite alternate}
.cel-title{font-size:22px;font-weight:700;color:white;margin-bottom:.25rem;letter-spacing:-.3px}
.cel-sub{font-size:13px;color:rgba(255,255,255,0.6)}
@keyframes cel-bounce{from{transform:scale(1) translateY(0)}to{transform:scale(1.12) translateY(-3px)}}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.cp{position:absolute;top:-12px;animation:cp-fall linear forwards}
@keyframes cp-fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}

/* HEADER */
.hdr{background:var(--navy);padding:calc(.6rem + env(safe-area-inset-top)) 1rem .6rem;position:sticky;top:0;z-index:200}
.hdr-r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.logo-img{height:24px;width:auto;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3))}
.rep-sel{font-size:13px;font-family:var(--f);font-weight:600;padding:5px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:white;cursor:pointer;-webkit-appearance:none}
.rep-sel option{background:var(--navy);color:white}
.hdr-r2{display:flex;align-items:center;justify-content:space-between;margin-bottom:.45rem}
.week-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.12);border-radius:20px;padding:3px 10px;border:1px solid rgba(255,255,255,0.15)}
.wp-lbl{font-size:10px;font-family:var(--m);color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:.5px}
.wp-div{width:1px;height:9px;background:rgba(255,255,255,0.2)}
.wp-val{font-size:11px;font-weight:700;color:white;font-family:var(--m);letter-spacing:.3px}
.loc-row{display:flex;align-items:center;gap:5px}
.loc-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);flex-shrink:0}
.loc-dot.on{background:#6EE7B7;animation:ldot 2s infinite}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:.3}}
.loc-lbl{font-size:10px;font-family:var(--m);color:rgba(255,255,255,0.4)}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:.4rem}
.kpi{background:rgba(255,255,255,0.08);border-radius:7px;padding:6px 4px;text-align:center;border:1px solid rgba(255,255,255,0.06)}
.kl{font-size:8px;font-family:var(--m);text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,0.4);margin-bottom:2px}
.kv{font-size:15px;font-weight:700;color:white;line-height:1}
.kv.g{color:#6EE7B7}.kv.a{color:#FCD34D}.kv.b{color:#93C5FD}
.prog{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--green);transition:width .4s}
.prog-lbl{font-size:9px;font-family:var(--m);color:rgba(255,255,255,0.3);margin-top:3px;text-align:right}

/* DAY NAV */
.day-nav{background:var(--card);border-bottom:1px solid var(--border);padding:.45rem .7rem;display:flex;align-items:stretch;gap:4px}
.day-nav-btn{width:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:var(--rad-sm);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:14px;color:var(--ink3);-webkit-appearance:none;font-family:var(--f)}
.day-nav-btn:active{background:var(--bg)}
.day-chips{display:flex;gap:4px;flex:1;overflow:hidden}
.day-chip{flex:1;min-width:0;text-align:center;padding:8px 4px;border-radius:var(--rad-sm);border:1px solid var(--border2);cursor:pointer;-webkit-user-select:none;background:transparent;transition:all .15s}
.day-chip:active{transform:scale(.96)}
.day-chip.act{background:var(--navy);border-color:var(--navy)}
.day-chip.act .dc-day,.day-chip.act .dc-area,.day-chip.act .dc-date,.day-chip.act .dc-wk{color:white}
.day-chip.act .dc-area{opacity:.75}
.day-chip.act .dc-date,.day-chip.act .dc-wk{opacity:.55}
.dc-day{font-size:11px;font-weight:700;color:var(--ink);letter-spacing:-.2px}
.dc-area{font-size:10px;color:var(--ink2);margin-top:1px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc-date{font-size:9px;font-family:var(--m);color:var(--ink3);margin-top:2px}
.dc-wk{font-size:9px;font-family:var(--m);color:var(--navy);margin-top:1px;font-weight:700}
.day-chip.today .dc-day{color:var(--green)}
.day-chip.today.act .dc-day{color:#6EE7B7}
.sched-btn{font-size:11px;font-weight:600;color:var(--ink3);padding:6px 8px;border-radius:var(--rad-sm);border:1px solid var(--border2);cursor:pointer;white-space:nowrap;background:transparent;-webkit-appearance:none;font-family:var(--f);align-self:center;flex-shrink:0}

/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:.4rem .7rem;gap:4px}
.tab{font-size:12px;font-weight:600;padding:7px 0;border-radius:var(--rad-sm);border:1px solid var(--border2);background:transparent;color:var(--ink3);cursor:pointer;-webkit-appearance:none;flex:1;text-align:center;font-family:var(--f)}
.tab:active{transform:scale(.96)}
.tab.act{background:var(--navy);color:white;border-color:var(--navy)}

.main{flex:1;overflow-y:auto;padding:.7rem}
.panel{display:none}.panel.act{display:block}

/* BANNERS */
.ca-banner{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--rad-sm);padding:.5rem .8rem;margin-bottom:.55rem;font-size:12px;color:#92400E;display:flex;align-items:flex-start;gap:6px;line-height:1.5;font-weight:600}
.prep-banner{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:var(--rad-sm);padding:.5rem .8rem;margin-bottom:.55rem;font-size:12px;color:#1E3A8A;line-height:1.5;font-weight:500}
.ro-banner{background:var(--blue-lt);border:1px solid #BFDBFE;border-radius:var(--rad-sm);padding:.5rem .8rem;font-size:12px;color:var(--blue);margin-bottom:.55rem;font-weight:600}

/* STOP LIST */
.stop-list{display:flex;flex-direction:column;gap:6px;margin-bottom:.7rem}

/* STOP CARD — key: shaded contrast when open */
.sc{background:var(--card);border-radius:var(--rad);border:1px solid var(--border);overflow:hidden;transition:border-color .2s,box-shadow .2s}
.sc.done{border-color:var(--green);border-width:1.5px}
.sc.flagged{border-color:var(--red)}
.sc.skipped{opacity:.5}
.sc.ca-stop{border-left:3px solid #F59E0B}
.sc.open{border-color:var(--navy);box-shadow:0 2px 12px rgba(30,58,95,0.12)}

/* STOP HEADER */
.sh{display:flex;align-items:center;gap:9px;padding:.7rem .85rem;cursor:pointer;-webkit-user-select:none;min-height:60px;transition:background .1s}
.sh:active{background:var(--bg)}
.sc.open .sh{background:var(--navy);border-radius:var(--rad) var(--rad) 0 0}
.sc.open .sh .sname{color:white}
.sc.open .sh .sarea{color:rgba(255,255,255,0.65)}
.sc.open .sh .stime{color:#6EE7B7}
.sc.open .sh .chev{color:rgba(255,255,255,0.6)}
.sc.open .sh .sbdg .bdg{opacity:.85}
.snum{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink3);font-family:var(--m)}
.snum.done{background:var(--green);color:white}
.snum.fl{background:var(--red);color:white}
.sc.open .sh .snum{background:rgba(255,255,255,0.15);color:white}
.sc.open .sh .snum.done{background:var(--green)}
.drag-h{color:var(--ink4);font-size:15px;cursor:grab;flex-shrink:0;padding:0 2px;touch-action:none}
.sc.open .sh .drag-h{color:rgba(255,255,255,0.4)}
.si{flex:1;min-width:0}
.sname{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
.sarea{font-size:12px;color:var(--ink2);margin-top:2px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stime{font-size:10px;color:var(--green);font-family:var(--m);margin-top:2px;font-weight:600}
.sbdg{display:flex;gap:3px;flex-wrap:wrap;flex-shrink:0;max-width:135px;justify-content:flex-end}
.bdg{font-size:10px;font-weight:700;padding:3px 7px;border-radius:10px;white-space:nowrap;letter-spacing:-.1px}
.b-cust{background:#EDE9FE;color:var(--purple)}
.b-pros{background:var(--amber-lt);color:var(--amber)}
.b-cod{background:var(--red-lt);color:var(--red)}
.b-pq{background:var(--blue-lt);color:var(--blue)}
.bsold{background:var(--green);color:white}
.bq{background:var(--blue-lt);color:var(--blue)}
.bdemo{background:var(--amber-lt);color:var(--amber)}
.bna{background:var(--red-lt);color:var(--red)}
.bsk{background:var(--bg);color:var(--ink3)}
.bfl{background:var(--red-lt);color:var(--red)}
.bca{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.chev{font-size:10px;color:var(--ink4);transition:transform .15s;flex-shrink:0;margin-left:2px}

/* DETAIL — white bg with top padding for contrast */
.sdet{display:none;border-top:1px solid var(--border);padding:.8rem .85rem;background:var(--card2)}
.sdet.op{display:block}

/* ARRIVE */
.arrive-wrap{background:var(--green-lt);border:1.5px solid #86EFAC;border-radius:var(--rad);padding:.85rem;margin-bottom:.7rem}
.aw-title{font-size:14px;font-weight:700;color:var(--green-dk);margin-bottom:.2rem}
.aw-sub{font-size:12px;color:var(--green-dk);opacity:.75;margin-bottom:.6rem;line-height:1.5}
.aw-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.btn-here{padding:11px;border-radius:var(--rad-sm);border:none;background:var(--green);color:white;font-size:13px;font-weight:700;font-family:var(--f);cursor:pointer}
.btn-here:active{transform:scale(.97)}
.btn-nhere{padding:11px;border-radius:var(--rad-sm);border:1px solid var(--border2);background:white;color:var(--ink2);font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer}
.btn-nhere:active{transform:scale(.97)}

/* STATUS TOGGLE */
.cst{display:flex;background:var(--bg);border-radius:var(--rad-sm);padding:3px;gap:2px;margin-bottom:.7rem;border:1px solid var(--border)}
.cst-o{flex:1;text-align:center;padding:7px 3px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;-webkit-user-select:none;color:var(--ink3);font-family:var(--f)}
.cst-o:active{transform:scale(.95)}
.on-cust{background:var(--purple-lt);color:var(--purple)}
.on-pros{background:var(--amber-lt);color:var(--amber)}
.on-cod{background:var(--red-lt);color:var(--red)}
.on-pq{background:var(--blue-lt);color:var(--blue)}

/* EDIT PANEL */
.ep{background:var(--bg);border-radius:var(--rad-sm);padding:.7rem;margin-bottom:.7rem;border:1px solid var(--border2)}
.ep-hdr{font-size:11px;font-weight:700;color:var(--ink2);margin-bottom:.5rem;font-family:var(--m);text-transform:uppercase;letter-spacing:.3px;display:flex;align-items:center;justify-content:space-between}
.ep-x{font-size:16px;cursor:pointer;color:var(--ink3)}
.ep-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.55rem}
.ef{display:flex;flex-direction:column;gap:3px}
.ef.full{grid-column:1/-1}
.flbl{font-size:10px;color:var(--ink4);font-family:var(--m);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.ef input,.ef select{font-size:14px;padding:8px 10px;border-radius:var(--rad-sm);border:1px solid var(--border2);background:white;color:var(--ink);width:100%;-webkit-appearance:none;font-family:var(--f)}
.ef input:focus,.ef select:focus{outline:none;border-color:var(--navy)}
.cyc-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.55rem}
.cyb{font-size:12px;font-weight:600;padding:6px 11px;border-radius:20px;border:1px solid var(--border2);background:white;color:var(--ink2);cursor:pointer;font-family:var(--f)}
.cyb.on{background:var(--navy);color:white;border-color:var(--navy)}
.ep-save{width:100%;padding:10px;border-radius:var(--rad-sm);border:none;background:var(--navy);color:white;font-size:13px;font-weight:700;font-family:var(--f);cursor:pointer}

/* CALL LINK */
.cl{display:flex;gap:5px;margin-bottom:.7rem;flex-wrap:wrap}
.clk{font-size:13px;font-weight:600;padding:8px 12px;border-radius:var(--rad-sm);text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.clk.ph{background:var(--green-lt);color:var(--green-dk);border:1px solid #86EFAC}
.clk:active{transform:scale(.96)}
.edit-btn{font-size:11px;font-weight:600;padding:5px 9px;border-radius:var(--rad-sm);border:1px solid var(--border2);background:var(--bg);color:var(--ink3);cursor:pointer;-webkit-appearance:none;font-family:var(--f)}

/* ROSTER TAG */
.roster-tag{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border-radius:20px;padding:4px 10px;margin-bottom:.7rem;border:1px solid var(--border2)}
.rt-text{font-size:11px;font-weight:600;color:var(--ink2);font-family:var(--m)}

/* BG NOTE */
.bg-note{font-size:12px;color:var(--ink2);background:var(--bg);border-radius:var(--rad-sm);padding:8px 10px;margin-bottom:.7rem;line-height:1.55;font-weight:500}
.bg-note.ca{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}

/* OUTCOME BUTTONS */
.orow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.7rem}
.ob{font-size:12px;font-family:var(--f);font-weight:700;padding:9px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--ink2);cursor:pointer;-webkit-appearance:none}
.ob:active{transform:scale(.93)}
.ob.as{background:var(--green);color:white;border-color:var(--green)}
.ob.aq{background:var(--blue);color:white;border-color:var(--blue)}
.ob.ad{background:var(--amber);color:white;border-color:var(--amber)}
.ob.at{background:var(--purple);color:white;border-color:var(--purple)}
.ob.an{background:var(--red-lt);color:var(--red);border-color:var(--red)}
.ob.ask{background:var(--bg);color:var(--ink3)}

/* SKIP */
.skip-box{background:var(--red-lt);border:1px solid #FECACA;border-radius:var(--rad-sm);padding:.6rem .8rem;margin-bottom:.7rem;display:none}
.skip-box.show{display:block}
.skip-title{font-size:11px;font-weight:700;color:var(--red);margin-bottom:.35rem}
.skip-pills{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.45rem}
.skp{font-size:11px;font-weight:600;padding:6px 10px;border-radius:20px;border:1px solid rgba(185,28,28,0.2);background:white;color:var(--red);cursor:pointer;font-family:var(--f)}
.skp.on{background:var(--red);color:white}
.skip-ta{width:100%;font-size:13px;font-family:var(--f);padding:7px 9px;border-radius:var(--rad-sm);border:1px solid rgba(185,28,28,0.2);background:white;color:var(--ink);resize:none;min-height:48px;line-height:1.5}
.skip-ta:focus{outline:none;border-color:var(--red)}

/* NOTES */
.ng{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.7rem}
.ng textarea,.eod-grid textarea{font-size:14px;font-family:var(--f);padding:8px 10px;border-radius:var(--rad-sm);border:1px solid var(--border2);background:white;color:var(--ink);resize:vertical;min-height:54px;line-height:1.5;width:100%}
.ng textarea:focus,.eod-grid textarea:focus{outline:none;border-color:var(--navy)}
.ref-box{background:var(--bg);border-radius:var(--rad-sm);padding:.5rem .7rem;margin-bottom:.7rem;border:1px solid var(--border2)}
.ref-t{font-size:11px;font-weight:700;color:var(--ink2);margin-bottom:.3rem;display:flex;align-items:center;gap:5px}
.ref-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);flex-shrink:0}
.ref-box textarea{font-size:13px;font-family:var(--f);padding:7px 9px;border-radius:var(--rad-sm);border:1px solid var(--border2);background:white;color:var(--ink);resize:vertical;min-height:38px;line-height:1.5;width:100%}
.ref-box textarea:focus{outline:none;border-color:var(--amber)}

/* ORDER + FLAG */
.ar{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap}
.oi{width:86px;font-size:14px;font-family:var(--m);padding:8px 9px;border-radius:var(--rad-sm);border:1px solid var(--border2);background:white;color:var(--ink);font-weight:600}
.oi:focus{outline:none;border-color:var(--navy)}
.fbtn{font-size:12px;font-family:var(--f);font-weight:700;padding:8px 12px;border-radius:var(--rad-sm);border:1px solid var(--red);background:var(--red-lt);color:var(--red);cursor:pointer;-webkit-appearance:none;margin-left:auto}
.fbtn.act{background:var(--red);color:white}

/* ADD STOP + EOD */
.add-stop-btn{width:100%;padding:10px;border-radius:var(--rad-sm);border:1px dashed var(--border2);background:transparent;color:var(--ink3);font-size:13px;font-family:var(--f);cursor:pointer;margin-bottom:.6rem;font-weight:600}
.add-stop-btn:active{background:var(--green-lt);border-color:var(--green);color:var(--green-dk)}
.eod{background:var(--card);border-radius:var(--rad);border:1px solid var(--border);padding:1rem;margin-bottom:.7rem}
.eod-title{font-size:10px;font-family:var(--m);text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);margin-bottom:.6rem;font-weight:700}
.eod-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.6rem}
.sbtn{width:100%;padding:12px;border-radius:var(--rad-sm);border:none;background:var(--navy);color:white;font-size:14px;font-weight:700;font-family:var(--f);cursor:pointer}

/* LEADERBOARD */
.lb-cards{display:flex;flex-direction:column;gap:9px}
.lb-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rad);padding:.85rem 1rem;position:relative;overflow:hidden}
.lb-card.me{border-color:var(--navy);border-width:1.5px}
.lb-rank{position:absolute;top:0;right:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border-radius:0 var(--rad) 0 var(--rad)}
.rk1{background:var(--amber-lt);color:var(--amber)}.rk2{background:var(--bg);color:var(--ink3)}.rk3{background:#F0FDF4;color:#15803D}
.lb-name{font-size:15px;font-weight:700;margin-bottom:1px;letter-spacing:-.2px;color:var(--ink)}
.lb-area{font-size:10px;color:var(--ink3);font-family:var(--m);margin-bottom:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.lb-bars{display:flex;flex-direction:column;gap:5px}
.lb-br{display:flex;align-items:center;gap:7px}
.lb-bl{font-size:9px;color:var(--ink3);font-family:var(--m);width:36px;text-transform:uppercase;font-weight:700}
.lb-bt{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.lb-bf{height:100%;border-radius:3px;transition:width .5s}
.lb-bv{font-size:10px;font-family:var(--m);color:var(--ink2);min-width:18px;text-align:right;font-weight:700}
.lb-tot{font-size:11px;color:var(--ink2);margin-top:.4rem;font-family:var(--m)}
.lb-tot strong{color:var(--ink);font-weight:700}

/* MESSAGES */
.msg-list{display:flex;flex-direction:column;gap:6px;margin-bottom:.55rem}
.msg-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:.6rem .8rem}
.msg-card.lead{border-color:#F59E0B}
.msg-hdr{display:flex;align-items:center;gap:6px;margin-bottom:.2rem}
.msg-from{font-size:13px;font-weight:700;color:var(--ink)}
.msg-time{font-size:10px;color:var(--ink3);font-family:var(--m);font-weight:600}
.msg-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;background:var(--amber-lt);color:var(--amber)}
.msg-body{font-size:13px;color:var(--ink2);line-height:1.5;font-weight:500}
.msg-compose{display:grid;grid-template-columns:1fr auto;gap:6px}
.msg-compose textarea{font-size:14px;font-family:var(--f);padding:8px 10px;border-radius:var(--rad-sm);border:1px solid var(--border2);background:var(--bg);color:var(--ink);resize:none;height:54px;line-height:1.5}
.msg-compose textarea:focus{outline:none;border-color:var(--navy)}
.msg-acts{display:flex;flex-direction:column;gap:4px}
.msb{font-size:11px;font-family:var(--f);font-weight:700;padding:8px 10px;border-radius:var(--rad-sm);border:none;background:var(--navy);color:white;cursor:pointer}
.mlb{font-size:11px;font-family:var(--f);font-weight:700;padding:8px 10px;border-radius:var(--rad-sm);border:1px solid #F59E0B;background:var(--amber-lt);color:var(--amber);cursor:pointer}

/* SCHEDULE */
.week-block{margin-bottom:.9rem}
.week-lbl{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:.4rem;letter-spacing:-.2px;font-family:var(--m)}
.sched-days{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.sched-day{background:var(--card);border-radius:var(--rad-sm);border:1px solid var(--border);padding:8px 5px;text-align:center;cursor:pointer;-webkit-user-select:none}
.sched-day:active{transform:scale(.95)}
.sched-day.act{background:var(--navy);border-color:var(--navy)}
.sched-day.act .sd-name{color:white}.sched-day.act .sd-area{color:rgba(255,255,255,0.55)}
.sched-day.td{border-color:var(--green)}.sched-day.td .sd-name{color:var(--green)}
.sd-name{font-size:12px;font-weight:700;color:var(--ink)}
.sd-area{font-size:9px;color:var(--ink3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}

/* MODAL */
.modw{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;overflow-y:auto;padding:1rem;padding-bottom:calc(1rem + env(safe-area-inset-bottom))}
.modw.op{display:block}
.mod{background:var(--card);border-radius:16px;padding:1.2rem;width:100%;max-width:500px;margin:0 auto}
.mod-title{font-size:16px;font-weight:700;margin-bottom:.85rem;display:flex;align-items:center;justify-content:space-between;letter-spacing:-.3px;color:var(--ink)}
.mod-x{font-size:22px;cursor:pointer;color:var(--ink3);line-height:1}
.mf{margin-bottom:.65rem}
.mf label{font-size:10px;font-family:var(--m);text-transform:uppercase;letter-spacing:.4px;color:var(--ink3);display:block;margin-bottom:4px;font-weight:700}
.mf input,.mf select{width:100%;font-size:14px;font-family:var(--f);padding:9px 10px;border-radius:var(--rad-sm);border:1px solid var(--border2);background:var(--bg);color:var(--ink);-webkit-appearance:none}
.mf input:focus,.mf select:focus{outline:none;border-color:var(--navy)}
.mbtns{display:flex;gap:7px;justify-content:flex-end;margin-top:.85rem}
.btn-c{font-size:13px;font-family:var(--f);padding:8px 14px;border-radius:var(--rad-sm);border:1px solid var(--border2);background:transparent;color:var(--ink2);cursor:pointer;font-weight:600}
.btn-a{font-size:13px;font-family:var(--f);font-weight:700;padding:8px 14px;border-radius:var(--rad-sm);border:none;background:var(--navy);color:white;cursor:pointer}

.inst{background:var(--navy);color:white;padding:.6rem 1rem;font-size:12px;text-align:center;display:none;font-weight:600}
.inst.vis{display:block}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--ink3);font-size:13px;line-height:1.7;font-weight:500}
.toast{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(65px);background:var(--ink);color:white;font-size:12px;font-weight:700;padding:9px 16px;border-radius:20px;z-index:998;transition:transform .22s;white-space:nowrap;font-family:var(--f)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:380px){
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .kpi-row .kpi:nth-child(n+4){display:none}
  .ng,.eod-grid,.ep-grid,.aw-btns{grid-template-columns:1fr}
}
</style>
</head>

<script>
const CS=new Date('2025-01-05');
function gci(d){const days=Math.floor((d-CS)/86400000);if(days<0)return{cycle:1,week:1};return{cycle:Math.floor(days/28)+1,week:Math.floor((days%28)/7)+1};}
function gdc(c,wi,di){return new Date(CS.getTime()+((c-1)*28+wi*7+di)*86400000);}
function fshort(d){return d.toLocaleDateString('en-NZ',{day:'numeric',month:'short'});}
function fdow(d){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];}
function ffull(d){return d.toLocaleDateString('en-NZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}

const TODAY=new Date();TODAY.setHours(0,0,0,0);
const TI=gci(TODAY);
const WEEKS=['W1','W2','W3','W4'],DAYS=['Mon','Tue','Wed','Thu','Fri'];
const DOW={1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri'};
const FREE=['Free','Cold Call','Tauranga','Tauriko','Rotorua','Morrinsville'];
const SLN={Ron:'Ron',Rep2:'Josh',Ham:'Darren'};
const SKIP_R=['Not open','No decision maker','Called ahead — not in','Out of stock','Will call next cycle'];

function cel(type){
  const c=CELS[type];if(!c)return;
  document.getElementById('celEmoji').textContent=c.emoji;
  document.getElementById('celTitle').textContent=c.title;
  document.getElementById('celSub').textContent=c.sub;
  document.getElementById('celebrate').classList.add('show');
  launchConfetti();setTimeout(hideCel,3500);
}
function hideCel(){document.getElementById('celebrate').classList.remove('show');}
function launchConfetti(){
  const wrap=document.getElementById('confetti');wrap.innerHTML='';
  const cols=['#1E3A5F','#E53935','#1A8C5E','#FCD34D','#93C5FD','#F9A8D4'];
  for(let i=0;i<65;i++){
    const p=document.createElement('div');p.className='cp';
    const sz=5+Math.random()*7;
    p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.innerHTML='',4500);
}

function isFree(rep,rk){const r=ROUTES[rep]&&ROUTES[rep][rk];if(!r)return true;return FREE.some(p=>r.area.includes(p));}
function getStops(){const r=ROUTES[curRep]&&ROUTES[curRep][curRK];return r?r.stops:[];}
function getArea(){const r=ROUTES[curRep]&&ROUTES[curRep][curRK];return r?r.area:'';}
function isOwn(){const v=document.getElementById('repSel').value;return!v||v===curRep;}
function isCA(s){return s.n&&s.n.toLowerCase().includes('call ahead');}
function initS(){getStops().forEach(s=>{if(!STATE[s.id])STATE[s.id]={o:null,note:'',val:'',time:null,loc:null,notHere:false,nextNote:'',ref:'',fl:false,cy:s.cycle||4,co:s.contact||'',ph:s.phone||'',status:s.status||'prospect',skipReason:'',skipNote:''};});}

function rkFromDate(d){const dow=d.getDay();const day=DOW[dow];if(!day)return null;const ci=gci(d);return'W'+ci.week+'-'+day;}
function wkFromDate(d){const ci=gci(d);return'W'+ci.week;}

// AUTO LOCATION
function checkAutoLoc(){
  const now=new Date();const h=now.getHours();const m=now.getMinutes();const dow=now.getDay();
  const isWork=dow>=1&&dow<=5&&(h>7||(h===7&&m>=30))&&h<17;
  const rep=document.getElementById('repSel').value;
  if(isWork&&rep){
    if(!locInterval){locInterval=setInterval(()=>sharePos(rep),60000);sharePos(rep);document.getElementById('locDot').className='loc-dot on';document.getElementById('locLbl').textContent='Sharing location';}
  } else if(locInterval){clearInterval(locInterval);locInterval=null;document.getElementById('locDot').className='loc-dot';document.getElementById('locLbl').textContent='Outside work hours';}
}
function sharePos(rep){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    const t=new Date().toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});
    const all=JSON.parse(localStorage.getItem('as_locs')||'{}');
    all[rep]={lat:pos.coords.latitude,lng:pos.coords.longitude,rep,time:t,area:getArea()};
    localStorage.setItem('as_locs',JSON.stringify(all));
    document.getElementById('locLbl').textContent='Sharing · '+t;
  },()=>{});
}

// WEEK BADGE
function updateWeekBadge(){
  const d=new Date(TODAY.getTime()+dayOffset*86400000);
  const ci=gci(d);
  document.getElementById('wpCycle').textContent='Cycle '+ci.cycle;
  document.getElementById('wpWeek').textContent=curRK.split('-')[0];
}

// DAY NAV — shows 3 days centred on dayOffset, with prev/next buttons
function buildDayNav(){
  const nav=document.getElementById('dayNav');
  const sb=nav.querySelector('.sched-btn');
  nav.innerHTML='';
  const rep=document.getElementById('repSel').value||curRep;

  // prev button
  const prevBtn=document.createElement('button');
  prevBtn.className='day-nav-btn';prevBtn.textContent='‹';
  prevBtn.onclick=()=>{dayOffset--;buildDayNav();};
  nav.appendChild(prevBtn);

  // 3 chips: offset-1, offset, offset+1
  const chipsWrap=document.createElement('div');chipsWrap.className='day-chips';
  [-1,0,1].forEach(rel=>{
    const abs=dayOffset+rel;
    const d=new Date(TODAY.getTime()+abs*86400000);
    const dow=d.getDay();const day=DOW[dow];
    let rk=null,area='—',wk='';
    if(day){const ci=gci(d);rk='W'+ci.week+'-'+day;const rd=ROUTES[rep]&&ROUTES[rep][rk];area=rd?rd.area:'—';wk='W'+ci.week;}
    const isToday=abs===0;const isAct=rk===curRK;
    const lbl=abs===0?'Today':abs===-1?'Yesterday':abs===1?'Tomorrow':(abs<0?Math.abs(abs)+' days ago':'+'+abs+' days');
    const chip=document.createElement('div');
    chip.className='day-chip'+(isToday?' today':'')+(isAct?' act':'');
    chip.innerHTML=`<div class="dc-day">${lbl}</div><div class="dc-area">${FREE.some(f=>area.includes(f))?'Free':area}</div><div class="dc-date">${fdow(d)} ${fshort(d)}</div><div class="dc-wk">${wk}</div>`;
    if(rk)chip.onclick=()=>{curRK=rk;expandId=null;editId=null;initS();buildDayNav();renderAll();};
    chipsWrap.appendChild(chip);
  });
  nav.appendChild(chipsWrap);

  // next button
  const nextBtn=document.createElement('button');
  nextBtn.className='day-nav-btn';nextBtn.textContent='›';
  nextBtn.onclick=()=>{dayOffset++;buildDayNav();};
  nav.appendChild(nextBtn);

  nav.appendChild(sb);
  updateWeekBadge();
}

function buildSchedGrid(){
  const rep=document.getElementById('repSel').value||curRep;
  const g=document.getElementById('schedGrid');g.innerHTML='';
  WEEKS.forEach((w,wi)=>{
    const wb=document.createElement('div');wb.className='week-block';
    const wl=document.createElement('div');wl.className='week-lbl';wl.textContent=w;wb.appendChild(wl);
    const dg=document.createElement('div');dg.className='sched-days';

// DRAG TO REORDER
function onDragStart(e,idx){dragSrcIdx=idx;e.dataTransfer.effectAllowed='move';}
function onDragOver(e,idx){e.preventDefault();if(dragSrcIdx===null||dragSrcIdx===idx)return;}
function onDrop(e,idx){
  e.preventDefault();if(dragSrcIdx===null||dragSrcIdx===idx)return;
  const stops=getStops();const moved=stops.splice(dragSrcIdx,1)[0];stops.splice(idx,0,moved);
  dragSrcIdx=null;renderStops();
}
function onDragEnd(){dragSrcIdx=null;}

// Touch drag for mobile
let touchSrcIdx=null,touchClone=null;
function onTouchStart(e,idx){
  touchSrcIdx=idx;
  const card=e.currentTarget.closest('.sc');
  const rect=card.getBoundingClientRect();
  touchClone=card.cloneNode(true);
  touchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.8;z-index:900;pointer-events:none;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.2)`;
  document.body.appendChild(touchClone);
  card.style.opacity='.3';
}
function onTouchMove(e){
  if(touchSrcIdx===null)return;
  e.preventDefault();
  const t=e.touches[0];
  if(touchClone){touchClone.style.top=(t.clientY-30)+'px';touchClone.style.left=(t.clientX-80)+'px';}
}
function onTouchEnd(e){
  if(touchSrcIdx===null)return;
  if(touchClone){touchClone.remove();touchClone=null;}
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const targetCard=el&&el.closest('.sc');
  if(targetCard){
    const cards=Array.from(document.querySelectorAll('.sc'));
    const toIdx=cards.indexOf(targetCard);
    if(toIdx>=0&&toIdx!==touchSrcIdx){
      const stops=getStops();const moved=stops.splice(touchSrcIdx,1)[0];stops.splice(toIdx,0,moved);
    }
  }
  touchSrcIdx=null;renderStops();
}

function rosterLabel(stopId,cy){
  const rks=[];
  Object.entries(ROUTES[curRep]||{}).forEach(([rk,rd])=>{
    if(rd.stops&&rd.stops.some(s=>s.id===stopId))rks.push(rk);
  });
  if(rks.length>0){return rks.map(rk=>{const[w,d]=rk.split('-');return w+' '+d;}).join(' & ');}
  return CYC_LBL[cy]||'Every '+cy+' weeks';
}

function doArrive(id){
  if(!STATE[id])STATE[id]={};
  STATE[id].time=new Date().toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});
  STATE[id].notHere=false;
  toast('Arrival recorded — getting location...');
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`)
        .then(r=>r.json()).then(data=>{
          const a=data.address||{};
          STATE[id].loc={lat:pos.coords.latitude.toFixed(5),lng:pos.coords.longitude.toFixed(5),suburb:a.suburb||a.neighbourhood||a.city_district||'',address:(a.road?a.road+', ':'')+( a.suburb||a.city||'')};
          renderStops();toast('Location captured ✓');
        }).catch(()=>{STATE[id].loc={lat:pos.coords.latitude.toFixed(5),lng:pos.coords.longitude.toFixed(5),suburb:'',address:''};renderStops();});
    },()=>renderStops());
  }else renderStops();
  updateKPIs();
}
function doNotHere(id){if(!STATE[id])STATE[id]={};STATE[id].notHere=true;renderStops();toast('Marked — notes accessible');}
function tog(id){expandId=expandId===id?null:id;if(expandId)editId=null;renderStops();}
function so(id,o){
  if(!STATE[id])STATE[id]={};
  if(!STATE[id].time&&!STATE[id].notHere){toast('Tap I am here first');return;}
  STATE[id].o=o;renderStops();updateKPIs();
  if(o==='sold'){salesStreak++;if(salesStreak===3)cel('streak3');else if(salesStreak===5)cel('streak5');else cel('sold');}
  else if(o==='demo'){salesStreak=0;const demos=getStops().filter(s=>STATE[s.id]&&STATE[s.id].o==='demo').length;if(demos>=5)cel('demo5');else cel('demo');}
  else salesStreak=0;
}
function setSkip(id,r){if(!STATE[id])STATE[id]={};STATE[id].skipReason=STATE[id].skipReason===r?'':r;renderStops();}
function uf(id,f,v){if(!STATE[id])STATE[id]={};STATE[id][f]=v;if(f==='nextNote')renderBanners();}
function flg(id){if(!STATE[id])STATE[id]={};STATE[id].fl=!STATE[id].fl;renderStops();if(STATE[id].fl)toast('Manager flagged ⚑');}

function updateKPIs(){
  const stops=getStops();let s=0,inv=0,d=0,q=0,tot=0,ct=0;
  stops.forEach(st=>{const dd=STATE[st.id];if(!dd||!dd.o||dd.o==='skip')return;s++;if(dd.o==='sold'){inv++;if(dd.val){tot+=parseFloat(dd.val);ct++;}}if(dd.o==='demo')d++;if(dd.o==='quoted')q++;});
  const t=20;const pct=Math.min(100,Math.round(s/t*100));
  document.getElementById('kS').textContent=s+'/'+stops.length;
  document.getElementById('kI').textContent=inv;document.getElementById('kD').textContent=d;document.getElementById('kQ').textContent=q;
  document.getElementById('kA').textContent=ct>0?'$'+Math.round(tot/ct):'—';
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pFill').style.background=pct>=100?'#6EE7B7':pct>=60?'#FCD34D':'#FCA5A5';
  document.getElementById('pLbl').textContent=s+' of '+t+' stops'+(pct>=100?' — target smashed! 🎯':'');
  if(pct>=100&&s===t)cel('target');
}

  const aov=ct>0?'$'+Math.round(tot/ct):'n/a';
  const lines=['**Autosmart NZ — End of Day Report**','**'+ffull(TODAY)+' | '+getArea()+' | Cycle '+TI.cycle+' '+curRK.split('-')[0]+'**','','**Rep:** '+(SLN[rep]||rep),'','**KPIs**','Stops: '+s+'/'+stops.length+'  |  Sales: '+inv+'  |  Demos: '+dm+'  |  Quotes: '+q+'  |  AOV: '+aov,''];

  if(skips.length){lines.push('**Skipped**');skips.forEach(sk=>lines.push('• '+sk));lines.push('');}
  if(flags.length){lines.push('**Manager flags**');flags.forEach(f=>lines.push('• '+f));lines.push('');}
  if(refs.length){lines.push('**Referrals**');refs.forEach(r=>lines.push('• '+r));lines.push('');}

  if(notes)lines.push('**Notes**',notes,'');if(cbs)lines.push('**Call backs**',cbs,'');
